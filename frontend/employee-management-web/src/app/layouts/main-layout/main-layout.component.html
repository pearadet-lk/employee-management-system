<mat-sidenav-container class="layout-container">
  <mat-sidenav mode="side" [opened]="sidenavOpened()" class="layout-sidenav">
    <div class="brand">EMS</div>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a mat-list-item routerLink="/employees" routerLinkActive="active">Employees</a>
      <a mat-list-item routerLink="/departments" routerLinkActive="active">Departments</a>
      <a mat-list-item routerLink="/reports" routerLinkActive="active">Reports</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <span>Employee Management</span>
      <span class="spacer"></span>
      @if (user(); as currentUser) {
        <button mat-button [matMenuTriggerFor]="userMenu">
          {{ currentUser.username }} ({{ currentUser.role }})
        </button>
        <mat-menu #userMenu="matMenu">
          <a mat-menu-item routerLink="/profile">Profile</a>
          <button mat-menu-item (click)="logout()">Logout</button>
        </mat-menu>
      }
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
